<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Sentinela - Plataforma integrada de segurança pública: mapeamento de ocorrências em tempo real e denúncias anônimas com chat seguro." />
  <meta name="theme-color" content="#0b1220" />
  <title>Sentinela — Segurança Pública Colaborativa</title>

  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=..."></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>

  <header class="header" id="topo">
    <div class="header__inner">
      <a href="#/inicio" class="brand" data-nav aria-label="Sentinela - início">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </span>
        <span class="brand__name">Sentinela</span>
      </a>

      <nav class="nav" aria-label="Navegação principal">
        <a href="#/inicio" class="nav__link" data-nav data-route="inicio">Início</a>
        <a href="#/mapa" class="nav__link" data-nav data-route="mapa">Mapa de Ocorrências</a>
        <a href="#/dashboard" class="nav__link" data-nav data-route="dashboard">Dashboard</a>
        <a href="#/denuncias" class="nav__link" data-nav data-route="denuncias">Denúncias Anônimas</a>
        <a href="#/acompanhar" class="nav__link" data-nav data-route="acompanhar">Acompanhar</a>
      </nav>

      <div class="header__actions">
        <button class="icon-btn" id="theme-toggle" type="button" aria-label="Alternar tema claro e escuro"
          title="Alternar tema">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
        </button>
        <a href="#/denuncias" class="btn btn--primary btn--sm" data-nav>Fazer denúncia</a>
        <button class="icon-btn nav-toggle" id="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M3 6h18M3 12h18M3 18h18" />
          </svg>
        </button>
      </div>
    </div>
    <nav class="nav-mobile" id="nav-mobile" aria-label="Navegação móvel" hidden>
      <a href="#/inicio" class="nav-mobile__link" data-nav>Início</a>
      <a href="#/mapa" class="nav-mobile__link" data-nav>Mapa de Ocorrências</a>
      <a href="#/denuncias" class="nav-mobile__link" data-nav>Denúncias Anônimas</a>
      <a href="#/acompanhar" class="nav-mobile__link" data-nav>Acompanhar</a>
    </nav>
  </header>


  <main id="app" class="app" tabindex="-1"></main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </span>
        <div>
          <p class="footer__title">Sentinela</p>
          <p class="footer__desc">Segurança pública colaborativa e denúncias protegidas.</p>
        </div>
      </div>
      <div>
        <a href="#/login" style="color: var(--text-faint); font-size: 0.82rem; text-decoration: underline;">Acesso
          Restrito</a>
        <p class="footer__note" style="margin-top: 8px;">Protótipo com dados simulados · Emergências: ligue 190</p>
      </div>
    </div>
  </footer>


  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>


  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
